# ============================================================================
# AI Music Platform — Nginx 生产环境配置
# 添加到服务器的 /etc/nginx/conf.d/ 或 nginx.conf
# ============================================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name music-plt.rich-thinker.asia music-api.rich-thinker.asia;
    return 301 https://$host$request_uri;
}

# ============================================================================
# 管理后台 — music-plt.rich-thinker.asia
# ============================================================================
server {
    listen 443 ssl http2;
    server_name music-plt.rich-thinker.asia;
    charset utf-8;

    # SSL 证书（使用已有的 Cloudflare 证书）
    ssl_certificate     /etc/ssl/cf/origin-certificate.pem;
    ssl_certificate_key /etc/ssl/cf/private-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker 内置 DNS
    resolver 127.0.0.11 valid=5s;

    # 前端静态资源（SPA）— 直接代理到 admin 容器
    location / {
        proxy_pass http://aimusic-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 管理后台 API 代理到后端
    location /api/ {
        proxy_pass http://aimusic-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # WebSocket 支持
    location /ws/ {
        proxy_pass http://aimusic-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

# ============================================================================
# API 服务 — music-api.rich-thinker.asia
# ============================================================================
server {
    listen 443 ssl http2;
    server_name music-api.rich-thinker.asia;
    charset utf-8;

    # SSL 证书（使用已有的 Cloudflare 证书）
    ssl_certificate     /etc/ssl/cf/origin-certificate.pem;
    ssl_certificate_key /etc/ssl/cf/private-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Docker 内置 DNS
    resolver 127.0.0.11 valid=5s;

    # API 代理
    location / {
        proxy_pass http://aimusic-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket 支持
    location /ws/ {
        proxy_pass http://aimusic-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # 上传文件访问
    location /uploads/ {
        proxy_pass http://aimusic-backend:8080/uploads/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Swagger API文档
    location /swagger/ {
        proxy_pass http://aimusic-backend:8080/swagger/;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://aimusic-backend:8080;
    }
}
