# ============================================================================
# AI Music Platform — Nginx 生产环境配置
# 复制到: /etc/nginx/conf.d/aimusic.conf
# ============================================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name music-plt.rich-thinker.asia music-api.rich-thinker.asia;
    return 301 https://$host$request_uri;
}

# ============================================================================
# 管理后台 — music-plt.rich-thinker.asia
# ============================================================================
server {
    listen 443 ssl http2;
    server_name music-plt.rich-thinker.asia;
    charset utf-8;

    # SSL 证书
    # Cloudflare证书路径（如果有的话）
    # ssl_certificate     /etc/ssl/cf/origin-certificate.pem;
    # ssl_certificate_key /etc/ssl/cf/private-key.pem;

    # 自签名证书（开发/测试用）
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # 前端静态资源 — 代理到admin容器的3000端口
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 管理后台 API — 代理到后端的8080端口
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

# ============================================================================
# API 服务 — music-api.rich-thinker.asia
# ============================================================================
server {
    listen 443 ssl http2;
    server_name music-api.rich-thinker.asia;
    charset utf-8;

    # SSL 证书
    # Cloudflare证书路径（如果有的话）
    # ssl_certificate     /etc/ssl/cf/origin-certificate.pem;
    # ssl_certificate_key /etc/ssl/cf/private-key.pem;

    # 自签名证书（开发/测试用）
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # API 代理
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # 上传文件
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Swagger API文档
    location /swagger/ {
        proxy_pass http://127.0.0.1:8080/swagger/;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8080;
    }
}
