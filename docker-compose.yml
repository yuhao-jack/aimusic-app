# ============================================================================
# AI Music Platform — Docker Compose
# ============================================================================

services:
  # -------------------------------------------------------------------------
  # MySQL 数据库
  # -------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: aimusic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1qaz@WSX3edc}
      MYSQL_DATABASE: aimusic
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-1qaz@WSX3edc}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - aimusic_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00

  # -------------------------------------------------------------------------
  # Redis 缓存
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aimusic-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - aimusic_redis_data:/data
    command: redis-server --appendonly yes

  # -------------------------------------------------------------------------
  # MinIO 对象存储
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: aimusic-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - aimusic_minio_data:/data
    command: server /data --console-address ":9001"

  # -------------------------------------------------------------------------
  # Go 后端 API 服务
  # -------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aimusic-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1qaz@WSX3edc}
      DB_NAME: aimusic
      REDIS_HOST: redis:6379
    volumes:
      - ./backend/configs:/app/configs:ro
      - aimusic_uploads:/app/uploads
    ports:
      - "127.0.0.1:8080:8080"

  # -------------------------------------------------------------------------
  # 管理后台前端
  # -------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: aimusic-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"

volumes:
  aimusic_mysql_data:
  aimusic_redis_data:
  aimusic_minio_data:
  aimusic_uploads:
