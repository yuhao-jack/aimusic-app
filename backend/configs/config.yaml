# ============================================================
# AI Music Platform 配置文件
# ============================================================

server:
  port: 8080
  mode: release
  api_version: /api/v1

mysql:
  host: ${DB_HOST:-127.0.0.1}
  port: ${DB_PORT:-3306}
  username: ${DB_USER:-root}
  password: ${DB_PASSWORD}
  database: ${DB_NAME:-aimusic}
  charset: utf8mb4
  max_open_conns: 100
  max_idle_conns: 20

redis:
  host: ${REDIS_HOST:-127.0.0.1}
  port: ${REDIS_PORT:-6379}
  password: ${REDIS_PASSWORD:-}
  db: 0
  pool_size: 100

jwt:
  secret: ${JWT_SECRET}
  expire_hours: 24
  refresh_expire_hours: 168

upload:
  path: ./uploads
  base_url: ${UPLOAD_BASE_URL:-http://localhost:8080/uploads}

cors:
  allowed_origins:
    - "https://music-plt.rich-thinker.asia"
    - "https://music-api.rich-thinker.asia"
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

ai:
  # 歌词生成 - 豆包API
  doubao_api_key: ${DOUBAO_API_KEY:-}
  doubao_base_url: https://ark.cn-beijing.volces.com/api/v3
  doubao_model: ${DOUBAO_MODEL:-ep-20241234567890abcdef}
  
  # 歌曲生成 - Suno API
  suno_api_key: ${SUNO_API_KEY:-}
  suno_base_url: https://api.suno.ai
  
  # 短信验证码
  sms:
    provider: aliyun
    access_key: ${SMS_ACCESS_KEY:-}
    secret_key: ${SMS_SECRET_KEY:-}
    sign_name: 音浪AI
    template_code: ${SMS_TEMPLATE_CODE:-}
  
  # 邮件验证码
  email:
    smtp_host: ${SMTP_HOST:-smtp.example.com}
    smtp_port: ${SMTP_PORT:-587}
    smtp_user: ${SMTP_USER:-}
    smtp_password: ${SMTP_PASSWORD:-}
    from_name: 音浪AI
