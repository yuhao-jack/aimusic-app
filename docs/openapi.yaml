openapi: 3.0.3
info:
  title: 音浪AI - AI音乐创作平台 API
  description: |
    音浪AI是一个全栈AI音乐创作平台，集成了AI歌词生成、AI歌曲生成、音乐社交、一起听房间、会员体系、积分商城等完整功能。
    
    ## 认证方式
    - **用户接口**: JWT Bearer Token (Header: `Authorization: Bearer <token>`)
    - **管理接口**: Admin JWT Bearer Token (Header: `Authorization: Bearer <admin_token>`)
    
    ## 响应格式
    ```json
    {
      "code": 0,        // 0=成功, 其他=错误码
      "msg": "success", // 错误信息
      "data": {}        // 响应数据
    }
    ```
    
    ## 限流规则
    - 登录接口: 5次/分钟/IP
    - 注册接口: 10次/分钟/IP
    - AI创作接口: 2次/分钟/用户
  version: 1.0.0
  contact:
    name: yuhao-jack
    url: https://gitee.com/yuhao-jack/aimusic-app

servers:
  - url: https://music-api.rich-thinker.asia
    description: 生产环境
  - url: http://localhost:8080
    description: 本地开发

tags:
  - name: auth
    description: 认证相关
  - name: music
    description: 音乐相关
  - name: ai
    description: AI创作
  - name: social
    description: 社交互动
  - name: membership
    description: 会员体系
  - name: shop
    description: 积分商城
  - name: tasks
    description: 每日任务
  - name: user
    description: 用户信息
  - name: playlist
    description: 歌单管理
  - name: together
    description: 一起听
  - name: admin-dashboard
    description: 管理后台-仪表盘
  - name: admin-user
    description: 管理后台-用户管理
  - name: admin-music
    description: 管理后台-音乐管理
  - name: admin-ai
    description: 管理后台-AI任务
  - name: admin-content
    description: 管理后台-内容管理
  - name: admin-commerce
    description: 管理后台-商业化
  - name: admin-operation
    description: 管理后台-运营管理
  - name: admin-analytics
    description: 管理后台-数据分析
  - name: admin-system
    description: 管理后台-系统管理

paths:
  # ==================== 认证相关 ====================
  /api/v1/user/register:
    post:
      tags: [auth]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  example: "testuser"
                password:
                  type: string
                  minLength: 6
                  example: "123456"
                nickname:
                  type: string
                  example: "测试用户"
                email:
                  type: string
                  format: email
                  example: "test@example.com"
                invite_code:
                  type: string
                  description: 邀请码（可选）
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/user/login:
    post:
      tags: [auth]
      summary: 密码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: "testuser"
                password:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/user/login/phone:
    post:
      tags: [auth]
      summary: 手机验证码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  example: "13800138000"
                code:
                  type: string
                  example: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/user/login/oauth:
    post:
      tags: [auth]
      summary: 第三方登录（Google/Apple/微信）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, open_id]
              properties:
                platform:
                  type: string
                  enum: [google, apple, wechat]
                open_id:
                  type: string
                nickname:
                  type: string
                avatar:
                  type: string
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/user/refresh-token:
    post:
      tags: [auth]
      summary: 刷新Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/user/send-sms-code:
    post:
      tags: [auth]
      summary: 发送短信验证码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  example: "13800138000"
      responses:
        '200':
          description: 发送成功

  /api/v1/user/reset-password:
    post:
      tags: [auth]
      summary: 重置密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code, new_password]
              properties:
                phone:
                  type: string
                code:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          description: 重置成功

  # ==================== 音乐相关 ====================
  /api/v1/music/recommend:
    get:
      tags: [music]
      summary: 获取推荐歌曲
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongListResponse'

  /api/v1/music/daily-recommend:
    get:
      tags: [music]
      summary: 获取每日推荐
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongListResponse'

  /api/v1/music/charts:
    get:
      tags: [music]
      summary: 获取音乐榜单列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        type:
                          type: string
                        description:
                          type: string

  /api/v1/music/rank/{type}:
    get:
      tags: [music]
      summary: 获取榜单歌曲
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [hot, new, like]
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongListResponse'

  /api/v1/music/search:
    get:
      tags: [music]
      summary: 搜索歌曲
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongListResponse'

  /api/v1/music/{song_id}:
    get:
      tags: [music]
      summary: 获取歌曲详情
      parameters:
        - name: song_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    $ref: '#/components/schemas/Song'

  /api/v1/music/{song_id}/comments:
    get:
      tags: [music]
      summary: 获取歌曲评论
      parameters:
        - name: song_id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/search/hot:
    get:
      tags: [music]
      summary: 获取热搜关键词
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        keyword:
                          type: string
                        count:
                          type: integer

  /api/v1/playlist/featured:
    get:
      tags: [music]
      summary: 获取精选歌单
      responses:
        '200':
          description: 成功

  /api/v1/banners:
    get:
      tags: [music]
      summary: 获取Banner列表
      responses:
        '200':
          description: 成功

  /api/v1/topics:
    get:
      tags: [music]
      summary: 获取公开话题列表
      responses:
        '200':
          description: 成功

  /api/v1/activities:
    get:
      tags: [music]
      summary: 获取公开活动列表
      responses:
        '200':
          description: 成功

  /api/v1/ads:
    get:
      tags: [music]
      summary: 获取广告位
      parameters:
        - name: position
          in: query
          schema:
            type: string
            enum: [splash, feed, rewarded]
      responses:
        '200':
          description: 成功

  /api/v1/ads/{id}/click:
    post:
      tags: [music]
      summary: 广告点击追踪
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/system/config:
    get:
      tags: [music]
      summary: 获取公开系统配置
      responses:
        '200':
          description: 成功

  /api/v1/system/version-check:
    get:
      tags: [music]
      summary: 版本检查
      parameters:
        - name: platform
          in: query
          required: true
          schema:
            type: string
            enum: [ios, android]
        - name: version_code
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      need_update:
                        type: boolean
                      force_update:
                        type: boolean
                      version_code:
                        type: integer
                      version_name:
                        type: string
                      update_url:
                        type: string
                      changelog:
                        type: string

  # ==================== AI创作 ====================
  /api/v1/ai/lyric/generate:
    post:
      tags: [ai]
      summary: 生成歌词
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt, style, emotion]
              properties:
                prompt:
                  type: string
                  description: 主题关键词
                  example: "思念故乡"
                style:
                  type: string
                  description: 音乐风格
                  example: "民谣"
                emotion:
                  type: string
                  description: 情绪
                  example: "伤感"
                lang:
                  type: string
                  default: "zh"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      lyric:
                        type: string
                      prompt:
                        type: string
                      coins_cost:
                        type: integer
                      coins_remain:
                        type: integer

  /api/v1/ai/lyric/optimize:
    post:
      tags: [ai]
      summary: 优化歌词
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lyric, style]
              properties:
                lyric:
                  type: string
                style:
                  type: string
      responses:
        '200':
          description: 成功

  /api/v1/ai/song/generate:
    post:
      tags: [ai]
      summary: 生成歌曲
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lyric, style, emotion, title]
              properties:
                lyric:
                  type: string
                style:
                  type: string
                emotion:
                  type: string
                title:
                  type: string
                voice_id:
                  type: string
                duration:
                  type: integer
                  default: 180
      responses:
        '200':
          description: 成功

  /api/v1/ai/task/{task_id}/progress:
    get:
      tags: [ai]
      summary: 获取任务进度
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/ai/chat/recommend:
    post:
      tags: [ai]
      summary: AI对话推荐
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: "推荐一些流行的歌曲"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      reply:
                        type: string

  # ==================== 用户信息 ====================
  /api/v1/user/info:
    get:
      tags: [user]
      summary: 获取用户信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
    put:
      tags: [user]
      summary: 更新用户信息
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                bio:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: 成功

  /api/v1/user/avatar:
    post:
      tags: [user]
      summary: 上传头像
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: 成功

  /api/v1/user/works:
    get:
      tags: [user]
      summary: 获取用户作品
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /api/v1/user/likes:
    get:
      tags: [user]
      summary: 获取用户点赞
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /api/v1/user/followers/{user_id}:
    get:
      tags: [user]
      summary: 获取粉丝列表
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/user/following/{user_id}:
    get:
      tags: [user]
      summary: 获取关注列表
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/user/follow/{target_id}:
    post:
      tags: [social]
      summary: 关注用户
      security:
        - bearerAuth: []
      parameters:
        - name: target_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/user/unfollow/{target_id}:
    post:
      tags: [social]
      summary: 取消关注
      security:
        - bearerAuth: []
      parameters:
        - name: target_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  # ==================== 社交互动 ====================
  /api/v1/post/create:
    post:
      tags: [social]
      summary: 发布动态
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                images:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 成功

  /api/v1/post/{post_id}:
    get:
      tags: [social]
      summary: 获取动态详情
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
    delete:
      tags: [social]
      summary: 删除动态
      security:
        - bearerAuth: []
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/post/{post_id}/like:
    post:
      tags: [social]
      summary: 点赞动态
      security:
        - bearerAuth: []
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/post/{post_id}/comment:
    post:
      tags: [social]
      summary: 评论动态
      security:
        - bearerAuth: []
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                parent_id:
                  type: integer
                  default: 0
      responses:
        '200':
          description: 成功

  /api/v1/music/{song_id}/like:
    post:
      tags: [social]
      summary: 点赞歌曲
      security:
        - bearerAuth: []
      parameters:
        - name: song_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/music/{song_id}/comment:
    post:
      tags: [social]
      summary: 评论歌曲
      security:
        - bearerAuth: []
      parameters:
        - name: song_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                parent_id:
                  type: integer
      responses:
        '200':
          description: 成功

  /api/v1/notifications:
    get:
      tags: [social]
      summary: 获取通知列表
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/notifications/{id}/read:
    put:
      tags: [social]
      summary: 标记通知已读
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/notifications/read-all:
    put:
      tags: [social]
      summary: 标记所有通知已读
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /api/v1/notifications/unread-count:
    get:
      tags: [social]
      summary: 获取未读通知数
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /api/v1/post/report:
    post:
      tags: [social]
      summary: 举报动态
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [post_id, reason]
              properties:
                post_id:
                  type: integer
                reason:
                  type: string
      responses:
        '200':
          description: 成功

  # ==================== 会员体系 ====================
  /api/v1/membership/info:
    get:
      tags: [membership]
      summary: 获取会员信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功

  /api/v1/membership/vip-plans:
    get:
      tags: [membership]
      summary: 获取VIP套餐列表
      responses:
        '200':
          description: 成功

  /api/v1/membership/coin-packages:
    get:
      tags: [membership]
      summary: 获取音币充值包列表
      responses:
        '200':
          description: 成功

  /api/v1/membership/buy-vip:
    post:
      tags: [membership]
      summary: 购买VIP
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
