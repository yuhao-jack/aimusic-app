  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            refresh_token:
              type: string
            user_id:
              type: integer
            username:
              type: string
            nickname:
              type: string

    Song:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        singer:
          type: string
        album:
          type: string
        cover:
          type: string
        audio_url:
          type: string
        style:
          type: string
        emotion:
          type: string
        duration:
          type: integer
        play_count:
          type: integer
        like_count:
          type: integer
        status:
          type: integer
        created_at:
          type: string
          format: date-time

    SongListResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Song'

    Error:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string

