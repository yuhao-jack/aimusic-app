  /api/v1/music/together/ws/{room_id}:
    get:
      tags: [together]
      summary: WebSocket连接（实时同步）
      description: |
        WebSocket连接端点，用于一起听房间的实时同步。
        连接后可发送/接收以下消息类型：
        - play: 播放
        - pause: 暂停
        - seek: 跳转进度
        - switch_song: 切换歌曲
        - chat: 聊天消息
        - user_join: 用户加入
        - user_leave: 用户离开
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: integer
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT Token
      responses:
        '101':
          description: WebSocket连接成功

