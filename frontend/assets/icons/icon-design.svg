<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 深邃科技蓝背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1B2838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1" />
    </linearGradient>
    
    <!-- 霓虹蓝光效 -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 霓虹紫光效 -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    
    <!-- 霓虹粉光效 -->
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 中心光晕 -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:0" />
    </radialGradient>
    
    <!-- 外发光 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <!-- 微妙的网格线 -->
  <g opacity="0.05" stroke="#00D4FF" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  
  <!-- 中心光晕 -->
  <circle cx="256" cy="256" r="200" fill="url(#centerGlow)"/>
  
  <!-- AI波形 - 动态声波效果 -->
  <g transform="translate(256, 280)" filter="url(#glow)">
    <!-- 波形条 -->
    <rect x="-120" y="-60" width="8" height="120" rx="4" fill="url(#neonBlue)" opacity="0.9">
      <animate attributeName="height" values="120;60;120" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-60;-30;-60" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-96" y="-80" width="8" height="160" rx="4" fill="url(#neonPurple)" opacity="0.8">
      <animate attributeName="height" values="160;80;160" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-80;-40;-80" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-72" y="-100" width="8" height="200" rx="4" fill="url(#neonBlue)" opacity="0.9">
      <animate attributeName="height" values="200;100;200" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-100;-50;-100" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-48" y="-70" width="8" height="140" rx="4" fill="url(#neonPink)" opacity="0.7">
      <animate attributeName="height" values="140;70;140" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-70;-35;-70" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="-24" y="-90" width="8" height="180" rx="4" fill="url(#neonPurple)" opacity="0.8">
      <animate attributeName="height" values="180;90;180" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-90;-45;-90" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="-110" width="8" height="220" rx="4" fill="url(#neonBlue)" opacity="1">
      <animate attributeName="height" values="220;110;220" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-110;-55;-110" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="-90" width="8" height="180" rx="4" fill="url(#neonPurple)" opacity="0.8">
      <animate attributeName="height" values="180;90;180" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-90;-45;-90" dur="1.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="48" y="-70" width="8" height="140" rx="4" fill="url(#neonPink)" opacity="0.7">
      <animate attributeName="height" values="140;70;140" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-70;-35;-70" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="72" y="-100" width="8" height="200" rx="4" fill="url(#neonBlue)" opacity="0.9">
      <animate attributeName="height" values="200;100;200" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-100;-50;-100" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="96" y="-80" width="8" height="160" rx="4" fill="url(#neonPurple)" opacity="0.8">
      <animate attributeName="height" values="160;80;160" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-80;-40;-80" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="-60" width="8" height="120" rx="4" fill="url(#neonBlue)" opacity="0.9">
      <animate attributeName="height" values="120;60;120" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-60;-30;-60" dur="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- AI文字 -->
  <g transform="translate(256, 160)" filter="url(#glow)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#neonBlue)">
      AI
    </text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" opacity="0.8" letter-spacing="8">
      MUSIC
    </text>
  </g>
  
  <!-- 装饰性光点 -->
  <circle cx="100" cy="100" r="3" fill="#00D4FF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="100" r="2" fill="#7C3AED" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="412" r="2" fill="#EC4899" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="412" cy="412" r="3" fill="#00D4FF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 角落装饰线 -->
  <line x1="50" y1="50" x2="100" y2="50" stroke="#00D4FF" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="50" x2="50" y2="100" stroke="#00D4FF" stroke-width="2" opacity="0.3"/>
  
  <line x1="462" y1="50" x2="412" y2="50" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
  <line x1="462" y1="50" x2="462" y2="100" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
  
  <line x1="50" y1="462" x2="100" y2="462" stroke="#EC4899" stroke-width="2" opacity="0.3"/>
  <line x1="50" y1="462" x2="50" y2="412" stroke="#EC4899" stroke-width="2" opacity="0.3"/>
  
  <line x1="462" y1="462" x2="412" y2="462" stroke="#00D4FF" stroke-width="2" opacity="0.3"/>
  <line x1="462" y1="462" x2="462" y2="412" stroke="#00D4FF" stroke-width="2" opacity="0.3"/>
</svg>
